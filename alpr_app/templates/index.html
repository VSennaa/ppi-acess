<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Acesso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            gap: 20px;
        }

        /* --- COLUNA ESQUERDA: DIVIDIDA EM DUAS --- */
        .esquerda-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px; /* Espaço entre os logs e o histórico */
        }

        .logs-container, .historico-container {
            flex: 1; /* Ocupam metade do espaço cada um */
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
        }

        .esquerda-container h3 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .historico-list { list-style: none; padding: 0; margin: 0; }
        .historico-item {
            padding: 10px;
            border-bottom: 1px solid #444;
            font-size: 0.9em;
        }
        .status-ok { color: #4caf50; }
        .status-fail { color: #f44336; }
        .log-texto { color: #ffca28; } /* Cor amarelada para os logs */

        /* Coluna Central: Câmera */
        .camera-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #000;
            border: 4px solid #555;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #status-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3em;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 8px;
            text-transform: uppercase;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .overlay-autorizado { background-color: rgba(76, 175, 80, 0.8); border: 3px solid #4caf50; }
        .overlay-negado { background-color: rgba(244, 67, 54, 0.8); border: 3px solid #f44336; }

        /* Coluna Direita: Nome do Servidor */
        .servidor-container {
            flex: 1;
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            text-align: center;
        }
        .servidor-container h3 { color: #888; font-size: 1.2em; margin-bottom: 5px; }
        #nome-servidor { font-size: 2em; font-weight: bold; margin: 0; color: #fff; }
        #placa-atual { font-size: 1.5em; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="esquerda-container">
        <div class="logs-container">
            <h3>Logs de Leitura (OCR)</h3>
            <ul class="historico-list" id="lista-logs"></ul>
        </div>

        <div class="historico-container">
            <h3>Histórico de Entrada</h3>
            <ul class="historico-list" id="lista-historico"></ul>
        </div>
    </div>

    <div class="camera-container">
        <img id="video-feed" src="/camera/live/" alt="Câmera Desconectada">
        <div id="status-overlay">AGUARDANDO...</div>
    </div>

    <div class="servidor-container">
        <h3>Nome do Servidor</h3>
        <p id="nome-servidor">---</p>
        <p id="placa-atual">---</p>
    </div>

    <script>
        const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const socket = new WebSocket(wsProtocol + window.location.host + '/ws/placas/status/');

        const overlay = document.getElementById('status-overlay');
        const nomeServidor = document.getElementById('nome-servidor');
        const placaAtual = document.getElementById('placa-atual');
        const listaHistorico = document.getElementById('lista-historico');
        const listaLogs = document.getElementById('lista-logs'); // Referência da nova lista

        let timeoutOverlay;

        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            // 1. VERIFICA SE É APENAS UM LOG DO SISTEMA
            if (data.is_log) {
                const liLog = document.createElement('li');
                liLog.className = 'historico-item';
                liLog.innerHTML = `<span style="color: #888">[${data.timestamp}]</span> <span class="log-texto">${data.mensagem}</span>`;
                listaLogs.prepend(liLog); // Joga pro topo
                
                // Mantém apenas os últimos 15 logs pra não poluir a tela
                if (listaLogs.children.length > 15) {
                    listaLogs.removeChild(listaLogs.lastChild);
                }
                return; // Encerra aqui, não processa placa
            }

            // 2. SE NÃO FOR LOG, É UM EVENTO DE PLACA OFICIAL
            placaAtual.innerText = "Placa: " + data.placa;
            if (data.status === 'autorizado') {
                nomeServidor.innerText = data.servidor;
                nomeServidor.style.color = "#4caf50";
                overlay.innerText = "AUTORIZADO";
                overlay.className = "overlay-autorizado";
            } else {
                nomeServidor.innerText = "DESCONHECIDO";
                nomeServidor.style.color = "#f44336";
                overlay.innerText = "NÃO AUTORIZADO";
                overlay.className = "overlay-negado";
            }

            overlay.style.display = "block";

            clearTimeout(timeoutOverlay);
            timeoutOverlay = setTimeout(() => {
                overlay.style.display = "none";
                nomeServidor.innerText = "---";
                placaAtual.innerText = "---";
            }, 5000);

            // Adiciona no Histórico Oficial embaixo
            const li = document.createElement('li');
            li.className = 'historico-item';
            const dataHora = new Date(data.timestamp).toLocaleTimeString();
            const cssClass = data.status === 'autorizado' ? 'status-ok' : 'status-fail';
            li.innerHTML = `<span style="color: #888">[${dataHora}]</span> <strong class="${cssClass}">${data.placa}</strong> - ${data.servidor || 'Desconhecido'}`;
            listaHistorico.prepend(li);
        };

        socket.onclose = function(e) { console.error('Socket fechado inesperadamente'); };
    </script>
</body>
</html>
